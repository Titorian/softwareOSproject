<!DOCTYPE html>
<html>
<head>
    <title>Library Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #f4f6f8;
        }

        .navbar {
            background-color: #1e293b;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            margin-top: 80px;
        }

        form {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            width: 90%;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            display: block;
            margin-top: 10px;
            color: #2563eb;
            text-decoration: none;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    📚 Library System
</div>

    <div class="login-container">
        <form action="/login" method="POST">
            <h2>Login</h2>
<div class="login-container">
<form action="/login" method="POST">

<h2>Login</h2>

{% if error %}
<p class="error">{{ error }}</p>

{% if "Too many" in error or "Incorrect" in error %}
<a href="/forgot">Forgot Password?</a>
{% endif %}

{% endif %}

<input type="text" name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

<a href="/register">Create an account</a>

</form>
</div>

</body>
</html>
