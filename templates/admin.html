<!DOCTYPE html>
<html>
<head>
    <title>Staff Panel</title>

    <style>
        body { font-family: Arial; background:#f4f6f8; }

        .navbar {
            background:#1e293b;
            color:white;
            padding:15px;
            display:flex;
            justify-content:space-between;
        }

        .navbar a {
            color:white;
            margin-left:15px;
            text-decoration:none;
        }

        table {
            width:90%;
            margin:30px auto;
            border-collapse:collapse;
            background:white;
        }

        th {
            background:#1e293b;
            color:white;
            padding:10px;
        }

        td {
            padding:10px;
            text-align:center;
        }

        form {
            text-align:center;
            margin:20px;
        }

        input {
            padding:8px;
            margin:5px;
        }

        button {
            padding:6px 10px;
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }

        .delete {
            background:red;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div><strong>📚 Staff Panel</strong></div>
    <div>
        <a href="/dashboard">User View</a>
        <a href="/logout">Logout</a>
    </div>
</div>


<form action="/add_book" method="POST">
    <h3>Add Book</h3>
    <input name="title" placeholder="Title" required>
    <input name="author" placeholder="Author" required>
    <input name="copies" type="number" placeholder="Copies" required>
    <input name="genre" placeholder="Genre" required>
    <button type="submit">Add Book</button>
</form>


<table>
<tr>
    <th>Title</th>
    <th>Author</th>
    <th>Copies</th>
    <th>Genre</th>
    <th>Checked Out By</th>
    <th>Last Checkout Time</th>
    <th>Action</th>
</tr>

{% for r in records %}
<tr>
    <td>{{ r[0] }}</td>
    <td>{{ r[1] }}</td>
    <td>{{ r[2] }}</td>
    <td>{{ r[3] }}</td>

    
    <td>
        {% if r[4] %}
            {{ r[4] }}
        {% else %}
            Available
        {% endif %}
    </td>

    
    <td>
        {% if r[5] %}
            {{ r[5] }}
        {% else %}
            -
        {% endif %}
    </td>

    
    <td>
        <form action="/delete_book/{{ r[0] }}" method="GET">
            <button class="delete" type="submit">Delete</button>
        </form>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
