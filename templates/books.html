<!DOCTYPE html>
<html>
<head>
    <title>Library Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #f4f6f8;
        }

        /* NAVBAR */
        .navbar {
            background-color: #1e293b;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        /* CONTAINER */
        .container {
            padding: 30px;
        }

        h2 {
            text-align: center;
        }

        /* TABLE */
        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background-color: #1e293b;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        /* BUTTONS */
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .checkout {
            background-color: #2563eb;
            color: white;
        }

        .return {
            background-color: #16a34a;
            color: white;
        }

        /* SEARCH BAR */
        .search {
            display: block;
            margin: 20px auto;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div><strong>📚 Library System</strong></div>
         
        <div>
            <a href="/login">Login</a>
            <a href="/dashboard">Books</a>
            <a href="/register">Create an Account</a>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="container">

        <h2>Available Books</h2>

        <!-- SEARCH BAR -->
        <input class="search" type="text" placeholder="Search books...">

        <!-- TABLE -->
        <table>
            <tr>
                <th>Book Title</th>
                <th>Author</th>
                <th>Status</th>
                <th>Num of Copies</th>
                <th>Genre</th>
            </tr>

           {% for book in books %}
<tr>
    <td>{{ book[0] }}</td>
    <td>{{ book[1] }}</td>

    <td>
        {% if book[2] > 0 %}
            Available
        {% else %}
            Checked Out
        {% endif %}
    </td>

    <td>{{ book[2] }}</td>   <!-- number of copies -->
    <td>{{ book[3] }}</td>   <!-- genre -->
</tr>
{% endfor %}

        </table>

    </div>

</body>
</html>
